<svg width="1600" height="520" viewBox="0 0 1600 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Narukana colorful anime-style hero banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="520">
      <stop offset="0%" stop-color="#FFF7FB"/>
      <stop offset="45%" stop-color="#F2FBFF"/>
      <stop offset="100%" stop-color="#FFFDF3"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6FAE"/>
      <stop offset="100%" stop-color="#FFB88C"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4CC9F0"/>
      <stop offset="100%" stop-color="#4ADEDE"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1600" height="520" rx="28" fill="url(#bg)"/>

  <circle cx="190" cy="95" r="72" fill="#FFD1E6" filter="url(#soft)"/>
  <circle cx="1460" cy="120" r="88" fill="#D7F4FF" filter="url(#soft)"/>
  <circle cx="1390" cy="420" r="96" fill="#FFF0C2" filter="url(#soft)"/>

  <path d="M90 420C280 350 420 425 590 360C760 295 905 365 1090 310C1260 260 1415 310 1530 240" stroke="#C7E8FF" stroke-width="20" stroke-linecap="round" opacity="0.7"/>
  <path d="M120 450C280 380 430 450 600 390C760 335 930 390 1090 340C1240 292 1380 335 1505 290" stroke="#FFD5E8" stroke-width="14" stroke-linecap="round" opacity="0.7"/>

  <!-- Anime-inspired mascot silhouette (abstract/chibi style) -->
  <g transform="translate(1080 120)">
    <ellipse cx="170" cy="250" rx="120" ry="20" fill="#DDEDF7"/>
    <path d="M95 230C95 183 118 146 170 146C222 146 245 183 245 230V285H95V230Z" fill="#FFFFFF" stroke="#B7D4EA" stroke-width="4"/>
    <circle cx="170" cy="112" r="64" fill="#FFF" stroke="#B7D4EA" stroke-width="4"/>
    <path d="M108 115C120 74 150 58 170 58C190 58 220 74 232 115C226 94 209 80 190 78C181 76 175 84 170 90C165 84 159 76 150 78C131 80 114 94 108 115Z" fill="url(#violet)"/>
    <circle cx="148" cy="115" r="7" fill="#3B4B63"/>
    <circle cx="192" cy="115" r="7" fill="#3B4B63"/>
    <path d="M154 136C162 144 178 144 186 136" stroke="#FF7DAF" stroke-width="4" stroke-linecap="round"/>
    <circle cx="132" cy="130" r="8" fill="#FFD1E6"/>
    <circle cx="208" cy="130" r="8" fill="#FFD1E6"/>
    <path d="M116 210C135 190 154 182 170 182C186 182 205 190 224 210" stroke="url(#cyan)" stroke-width="8" stroke-linecap="round"/>
    <circle cx="95" cy="232" r="16" fill="#FFF" stroke="#B7D4EA" stroke-width="4"/>
    <circle cx="245" cy="232" r="16" fill="#FFF" stroke="#B7D4EA" stroke-width="4"/>
  </g>

  <!-- Left content card -->
  <g transform="translate(120 90)">
    <rect width="780" height="300" rx="26" fill="#FFFFFF" stroke="#D5E9F8"/>
    <text x="42" y="84" fill="#2A3F5A" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="700">Spec → Plan → Tasks</text>
    <text x="42" y="132" fill="#4B6B89" font-family="Segoe UI, Arial, sans-serif" font-size="26">A colorful workflow for focused, collaborative execution.</text>

    <g transform="translate(42 170)">
      <rect width="180" height="44" rx="22" fill="url(#pink)"/>
      <text x="90" y="29" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">1. Write Specs</text>
    </g>
    <g transform="translate(250 170)">
      <rect width="200" height="44" rx="22" fill="url(#cyan)"/>
      <text x="100" y="29" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">2. Generate Plan</text>
    </g>
    <g transform="translate(478 170)">
      <rect width="220" height="44" rx="22" fill="url(#violet)"/>
      <text x="110" y="29" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">3. Execute Tasks</text>
    </g>

    <text x="42" y="252" fill="#6D8AA6" font-family="Segoe UI, Arial, sans-serif" font-size="22">Narukana v1.0.0 • Standalone OpenCode Spec Engine</text>
  </g>
</svg>
